name: Android Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Fast first-class gate: unit + Robolectric integration tests.
  unit-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit + integration (Robolectric) tests
        run: ./gradlew testDebugUnitTest

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-report
          path: |
            app/build/reports/tests/testDebugUnitTest
            app/build/test-results/testDebugUnitTest
          if-no-files-found: ignore

  # On-device integration tests on an Android emulator.
  instrumented-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        api-level: [ 29 ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-test-report-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/connected
            app/build/outputs/androidTest-results/connected
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Verify debug APK exists
        run: |
          test -f app/build/outputs/apk/debug/app-debug.apk
          ls -lh app/build/outputs/apk/debug/app-debug.apk

      - name: Run release lint (hard gate)
        run: ./gradlew :app:lintRelease

      - name: Upload lint report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report-release
          path: app/build/reports/lint-results-release.html
          if-no-files-found: ignore

      - name: Build release APK with R8 (hard gate, unsigned ok)
        run: ./gradlew :app:assembleRelease

      - name: Verify release APK exists and is non-empty
        run: |
          APK="$(python3 -c 'import glob, os, sys; preferred = ["app/build/outputs/apk/release/app-release.apk", "app/build/outputs/apk/release/app-release-unsigned.apk"]; paths = [p for p in preferred if os.path.isfile(p)] or sorted(glob.glob("app/build/outputs/apk/release/*.apk")); print(paths[0] if paths else ""); sys.exit(0 if paths else 1)')"
          test -f "$APK"
          test -s "$APK"
          ls -lh "$APK"

      - name: Upload R8 mapping artifact (build job)
        uses: actions/upload-artifact@v7
        with:
          name: bebecup-r8-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: bebecup-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore release keystore
        env:
          BEBECUP_RELEASE_KEYSTORE_BASE64: ${{ secrets.BEBECUP_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$BEBECUP_RELEASE_KEYSTORE_BASE64"
          mkdir -p release
          printf '%s' "$BEBECUP_RELEASE_KEYSTORE_BASE64" | base64 -d > release/bebecup-release.p12
          test -s release/bebecup-release.p12

      - name: Run tests
        run: ./gradlew test

      - name: Build signed release APK and AAB
        env:
          BEBECUP_RELEASE_STORE_FILE: release/bebecup-release.p12
          BEBECUP_RELEASE_STORE_PASSWORD: ${{ secrets.BEBECUP_RELEASE_STORE_PASSWORD }}
          BEBECUP_RELEASE_KEY_ALIAS: ${{ secrets.BEBECUP_RELEASE_KEY_ALIAS }}
          BEBECUP_RELEASE_KEY_PASSWORD: ${{ secrets.BEBECUP_RELEASE_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_bebecup.requireReleaseSigning: "true"
        run: |
          ./gradlew :app:assembleRelease
          ./gradlew :app:bundleRelease

      - name: Verify release signing certificate
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then
            APK="$(python3 -c 'import glob, os, sys; paths = sorted(p for p in glob.glob("app/build/**/*.apk", recursive=True) if "release" in os.path.basename(p).lower() or "/release/" in p.replace("\\", "/").lower()); print(paths[0] if paths else ""); sys.exit(0 if paths else 1)')"
          fi
          test -f "$APK"
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls -1 "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)/apksigner"
          "$APKSIGNER" verify "$APK"

      - name: Prepare release asset
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then
            APK="$(python3 -c 'import glob, os, sys; paths = sorted(p for p in glob.glob("app/build/**/*.apk", recursive=True) if "release" in os.path.basename(p).lower() or "/release/" in p.replace("\\", "/").lower()); print(paths[0] if paths else ""); sys.exit(0 if paths else 1)')"
          fi
          test -f "$APK"
          cp "$APK" "bebecup-${GITHUB_REF_NAME}.apk"
          test -s "bebecup-${GITHUB_REF_NAME}.apk"
          ls -lh "bebecup-${GITHUB_REF_NAME}.apk"

      - name: Verify signed release AAB exists
        run: |
          AAB="app/build/outputs/bundle/release/app-release.aab"
          test -f "$AAB"
          test -s "$AAB"
          cp "$AAB" "bebecup-${GITHUB_REF_NAME}.aab"
          ls -lh "bebecup-${GITHUB_REF_NAME}.aab"

      - name: Prepare R8 mapping for release asset
        run: |
          MAPPING="app/build/outputs/mapping/release/mapping.txt"
          test -f "$MAPPING"
          test -s "$MAPPING"
          cp "$MAPPING" "bebecup-${GITHUB_REF_NAME}.mapping.txt"
          ls -lh "bebecup-${GITHUB_REF_NAME}.mapping.txt"

      - name: Upload signed release AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: bebecup-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload R8 mapping artifact (release job)
        uses: actions/upload-artifact@v7
        with:
          name: bebecup-release-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error

      - name: Prepare release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$VERSION" '
            BEGIN { heading = "## v" version }
            index($0, heading) == 1 && (length($0) == length(heading) || substr($0, length(heading) + 1, 1) == " " || substr($0, length(heading) + 1, 1) == "-") {
              sub(/^## /, "")
              sub(/ - [0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]$/, "")
              print
              exit
            }
          ' CHANGELOG.md > release-title.txt
          test -s release-title.txt
          awk -v version="$VERSION" '
            BEGIN { heading = "## v" version }
            index($0, heading) == 1 && (length($0) == length(heading) || substr($0, length(heading) + 1, 1) == " " || substr($0, length(heading) + 1, 1) == "-") {
              found = 1; next
            }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "bebecup-${GITHUB_REF_NAME}.apk" \
            "bebecup-${GITHUB_REF_NAME}.aab" \
            "bebecup-${GITHUB_REF_NAME}.mapping.txt" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$(cat release-title.txt)" \
            --notes-file release-notes.md
